  heading: Cloud Security & Compliance Architecture
  btn: Federal Buyers

services:
  heading: What We Do
  subheading: "Senior cloud security expertise for organizations that can't afford to get it wrong."
  service:
    - icon: fas fa-shield-halved
      heading: Cloud Security Architecture
      text: "AWS-native security design for regulated workloads. Identity, network, and data protection patterns aligned with FedRAMP, NIST 800-53, SOC 2, HIPAA, and PCI."
    - icon: fas fa-clipboard-check
      heading: Compliance & Authorization
      text: "Hands-on compliance program build-out across federal and commercial environments. FedRAMP and NIST 800-53 implementation for federal programs, plus SOC 2, HIPAA, and PCI readiness for regulated commercial organizations."
    - icon: fas fa-gears
      heading: DevSecOps & Security Automation
      text: "Infrastructure as code with integrated security scanning, audit logging, and continuous compliance validation. Terraform, AWS-native, and policy-as-code patterns."

federal:
  heading: Federal Buyers
  subheading: "Active SAM.gov registration. Federal-ready cloud security, compliance, DevSecOps, and IT modernization support."
  how_to_buy: "TechVizions LLC provides fixed-scope cloud security, compliance, DevSecOps, and IT modernization support for federal buyers. Engagements can be structured for streamlined purchasing, including under the $25,000 micro-purchase threshold when appropriate."
