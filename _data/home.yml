      url: /cloud-security-assessment/
      text: "Rapid review of cloud identity, network, logging, data protection, and control gaps with prioritized remediation guidance."
    - title: NIST / FedRAMP Gap Review
      price: "Starting at $12,500"
      url: /fedramp-nist-gap-review/
      text: "Control-aligned assessment for federal cloud workloads, authorization readiness, and evidence planning."
    - title: DevSecOps Pipeline Review
      price: "Starting at $8,500"
      url: /devsecops-pipeline-review/
      text: "Security automation review for CI/CD, infrastructure as code, scanning, audit trails, and continuous compliance."

